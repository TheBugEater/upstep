[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @upstep/web exec prisma generate && pnpm --filter @upstep/web run build"

[deploy]
startCommand = "pnpm --filter @upstep/web exec prisma migrate deploy && pnpm --filter @upstep/web run start"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
