name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: build
          POSTGRES_USER: build
          POSTGRES_PASSWORD: build
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U build -d build"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://build:build@localhost:5432/build
      DIRECT_URL: postgresql://build:build@localhost:5432/build
      AUTH_SECRET: ci-only-secret
      AUTH_URL: http://localhost:3000
      GITHUB_CLIENT_ID: ci
      GITHUB_CLIENT_SECRET: ci
      GOOGLE_CLIENT_ID: ci
      GOOGLE_CLIENT_SECRET: ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @upstep/web exec prisma generate
      - run: pnpm --filter @upstep/web exec prisma validate
      - run: pnpm --filter @upstep/web exec prisma migrate deploy
      - run: pnpm test
      - run: pnpm type-check
      - run: pnpm build
